<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg">
</head>
<body>
    <div class="container">
        <main class="main-content">
            <div class="left-hero">
                <!-- Image source matching the typical Instagram mockups -->
                <div class="phones-wrapper">
                    <img src="https://static.cdninstagram.com/images/instagram/xig/homepage/phones/home-phones-2x.png?__makehaste_cache_breaker=73SVAexZgBW" alt="Instagram Phones" class="phones-img" onerror="this.src='https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=380&h=581&auto=format&fit=crop'; this.style.borderRadius='30px';">
                </div>
            </div>
            
            <div class="right-panel">
                <div class="box login-box">
                    <div class="logo-container">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram" class="logo">
                    </div>
                    
                    <form class="login-form" action="#" method="POST">
                        <div class="input-group">
                            <input type="text" id="username" name="username" placeholder="Phone number, username, or email" required aria-label="Phone number, username, or email">
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" name="password" placeholder="Password" required aria-label="Password">
                        </div>
                        <button type="submit" class="login-btn">Log in</button>
                        
                        <div class="divider">
                            <div class="line"></div>
                            <div class="or-text">OR</div>
                            <div class="line"></div>
                        </div>
                        
                        <button type="button" class="fb-login">
                            <svg viewBox="0 0 24 24" class="fb-logo" fill="currentColor">
                                <path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/>
                            </svg>
                            Log in with Facebook
                        </button>
                        
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </form>
                </div>
                
                <div class="box signup-box">
                    <p>Don't have an account? <a href="#" class="signup-link">Sign up</a></p>
                </div>
                
                <div class="app-download">
                    <p>Get the app.</p>
                    <div class="store-buttons">
                        <img src="https://static.cdninstagram.com/rsrc.php/v3/yt/r/Yfc020c87j0.png" alt="Get it on Google Play" class="store-btn">
                        <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Get it from Microsoft" class="store-btn">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Peringatan Cyber Security -->
    <footer class="cyber-warning">
        <p>⚠️ PERINGATAN: Halaman ini adalah simulasi edukasi keamanan cyber. Perhatikan URL sebelum memasukan data sensitive! ⚠️</p>
    </footer>
</body>
</html>
